<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 立方体的三个可见面 -->
  <!-- 顶面 -->
  <polygon points="50,20 80,35 50,50 20,35" fill="#4A90E2" stroke="#2E5C8A" stroke-width="1"/>
  <!-- 左面 -->
  <polygon points="20,35 20,65 50,80 50,50" fill="#357ABD" stroke="#2E5C8A" stroke-width="1"/>
  <!-- 右面 -->
  <polygon points="50,50 50,80 80,65 80,35" fill="#5BA3E8" stroke="#2E5C8A" stroke-width="1"/>
</svg>
